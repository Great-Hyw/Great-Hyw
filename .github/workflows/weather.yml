name: Generate Weather Card

# 触发条件：每天早上 8 点和晚上 8 点自动运行（GitHub 时间通常是 UTC，这里简单设置为每天两次）
# 也可以手动点击运行
on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 下载你的代码
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. 生成天气图片代码
      # 我们直接生成一段 Markdown 代码，写入到一个叫 WEATHER.md 的文件里
      - name: Generate Weather Markdown
        run: |
          # 定义城市（拼音）
          CITY="Fuzhou"
          
          # 生成 Markdown 内容
          # 这里使用了 wttr.in 的卡片模式，加了透明背景参数
          echo "<div align=\"center\">" > WEATHER.md
          echo "### 江西抚州实时天气" >> WEATHER.md
          echo "" >> WEATHER.md
          echo "<img src=\"https://wttr.in/${CITY}.png?style=3&lang=zh-cn\" alt=\"Weather\" />" >> WEATHER.md
          echo "</div>" >> WEATHER.md

      # 3. 把生成的 WEATHER.md 文件提交回你的仓库
      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "chore: 自动更新天气卡片"
          file_pattern: WEATHER.md
