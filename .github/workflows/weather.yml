name: Update Xinzhi Weather

on:
  schedule:
    - cron: '0 */6 * * *' # 每6小时自动运行一次
  workflow_dispatch:      # 允许手动触发

jobs:
  update-weather:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Fetch Weather Data
        run: |
          # 替换为你自己的城市ID（比如南昌的城市ID），可以在心知控制台找到
          LOCATION_ID="WSFWYTUM7M71" 
          
          # 调用API获取实时天气JSON数据
          RESPONSE=$(curl -s "https://api.seniverse.com/v3/weather/now.json?key=${{ secrets.XINZHI_API_KEY }}&location=$LOCATION_ID&language=zh-Hans&unit=c")
          
          # 从JSON中提取温度和天气现象（使用简单的grep和sed截取）
          TEMP=$(echo $RESPONSE | grep -o '"temperature":"[^"]*' | grep -o '[^"]*$')
          TEXT=$(echo $RESPONSE | grep -o '"text":"[^"]*' | grep -o '[^"]*$')
          
          # 生成要写入README的天气卡片HTML代码
          read -r -d '' WEATHER_CARD << EOL
          <!--START_SECTION:weather-->
          <div align="center">
            <h3>🌤 实时天气 (心知天气)</h3>
            <p><b>当前天气：$TEXT | 温度：$TEMP°C</b></p>
            <small>数据每小时自动更新</small>
          </div>
          <!--END_SECTION:weather-->
          EOL
          
          # 将生成的内容保存到临时文件
          echo "$WEATHER_CARD" > weather_temp.txt

      - name: Update README
        run: |
          # 检查README中是否有天气标记，有则替换，无则追加
          if grep -q "<!--START_SECTION:weather-->" README.md; then
            # 使用perl进行跨行替换
            perl -i -0777 -pe 's/<!--START_SECTION:weather-->.*?<!--END_SECTION:weather-->//s' README.md
            cat weather_temp.txt >> README.md
          else
            echo "" >> README.md
            cat weather_temp.txt >> README.md
          fi

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: 自动更新心知天气数据" && git push)
