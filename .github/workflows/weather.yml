name: Update Weather

on:
  schedule:
    - cron: '0 */6 * * *' # 每6小时运行一次
  workflow_dispatch: # 允许手动运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Update Weather in README
        run: |
          # 使用国内镜像源
          WEATHER_IMG="https://wttr.wtf/Fuzhou?style=4&lang=zh-cn"
          
          # 生成 Markdown 图片代码
          WEATHER_MD="<div align=\"center\">
          <h3>🌤 江西抚州 · 实时天气</h3>
          <img src=\"$WEATHER_IMG\" alt=\"抚州天气\" width=\"400\" />
          </div>"
          
          # 使用 sed 命令替换 README.md 中的占位符
          # 请确保你的 README.md 里有一行注释 <!-- weather-start --> 和 <!-- weather-end -->
          # 如果没有，请手动添加，或者直接用下面的命令替换整个文件（不推荐）
          
          # 这里我们采用追加的方式，如果 README 里没有占位符，就直接追加到文件末尾
          echo "$WEATHER_MD" >> README.md
          
          # 如果你想替换掉旧的天气代码，可以用 sed 命令
          # sed -i '/<!-- weather-start -->/,/<!-- weather-end -->/c\<!-- weather-start -->\n'"$WEATHER_MD"'\n<!-- weather-end -->' README.md

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "chore: 自动更新天气"
